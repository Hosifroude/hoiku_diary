<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ほいくにっき">
<title>ほいくにっき</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #fdf6ec;
    --warm: #f5e6d0;
    --brown: #8b6347;
    --brown-dark: #5c3d2e;
    --accent: #d4845a;
    --green: #7a9e7e;
    --blue: #7a9ab5;
    --purple: #9b89b4;
    --yellow: #c9a84c;
    --text: #3a2a1e;
    --text-light: #8b7355;
    --shadow: 0 4px 20px rgba(139,99,71,0.12);
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
  }

  /* HEADER */
  .header {
    background: var(--brown-dark);
    padding: 16px 20px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-title {
    font-family: 'Noto Serif JP', serif;
    color: var(--cream);
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  .header-date {
    color: var(--warm);
    font-size: 12px;
    opacity: 0.8;
  }
  .settings-btn {
    background: none;
    border: none;
    color: var(--cream);
    font-size: 22px;
    cursor: pointer;
    padding: 4px;
  }
  .weather-row {
    display: flex;
    gap: 6px;
    margin-top: 8px;
  }
  .weather-btn {
    background: rgba(255,255,255,0.12);
    border: 1.5px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    color: var(--cream);
    font-size: 13px;
    padding: 3px 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .weather-btn.selected {
    background: rgba(255,255,255,0.28);
    border-color: rgba(255,255,255,0.6);
    font-weight: 700;
  }

  /* TABS */
  .tabs {
    display: flex;
    background: var(--warm);
    border-bottom: 2px solid rgba(139,99,71,0.15);
    position: sticky;
    top: 0px;
    z-index: 99;
  }
  .tab {
    flex: 1;
    padding: 12px 4px;
    text-align: center;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-light);
    cursor: pointer;
    border: none;
    background: none;
    transition: all 0.2s;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
  }
  .tab.active {
    color: var(--brown-dark);
    font-weight: 700;
    border-bottom-color: var(--accent);
    background: var(--cream);
  }

  /* SCREENS */
  .screen { display: none; padding: 16px; }
  .screen.active { display: block; }

  /* EVENT INPUT */
  .category-groups { margin-bottom: 14px; }
  .category-group { margin-bottom: 10px; }
  .category-group-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-light);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 5px;
    padding-left: 2px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .category-group-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(139,99,71,0.15);
  }
  .category-grid {
    display: grid;
    gap: 7px;
  }
  .category-grid.cols4 { grid-template-columns: repeat(4, 1fr); }
  .category-grid.cols3 { grid-template-columns: repeat(3, 1fr); }
  .category-btn {
    padding: 10px 6px;
    border-radius: var(--radius);
    border: 2px solid transparent;
    background: white;
    cursor: pointer;
    text-align: center;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 11px;
    font-weight: 500;
    color: var(--text);
    box-shadow: var(--shadow);
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .category-btn .icon { font-size: 22px; }
  .category-btn.selected { border-color: var(--accent); background: #fff5ee; }
  .category-btn[data-cat="breakfast"].selected { border-color: var(--yellow); background: #fffbf0; }
  .category-btn[data-cat="lunch"].selected { border-color: var(--yellow); background: #fffbf0; }
  .category-btn[data-cat="dinner"].selected { border-color: var(--yellow); background: #fffbf0; }
  .category-btn[data-cat="snack"].selected { border-color: var(--accent); background: #fff5ee; }
  .category-btn[data-cat="wakeup"].selected { border-color: var(--blue); background: #f0f6ff; }
  .category-btn[data-cat="bedtime"].selected { border-color: var(--blue); background: #f0f6ff; }
  .category-btn[data-cat="nap"].selected { border-color: var(--blue); background: #f0f6ff; }
  .category-btn[data-cat="play"].selected { border-color: var(--green); background: #f0fff4; }
  .category-btn[data-cat="poop"].selected { border-color: var(--purple); background: #f8f0ff; }
  .category-btn[data-cat="bath"].selected { border-color: var(--green); background: #f0fff4; }
  .category-btn[data-cat="other"].selected { border-color: #aaa; background: #f5f5f5; }

  .input-group { margin-bottom: 14px; }
  .input-label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-light);
    margin-bottom: 6px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .input-field {
    width: 100%;
    padding: 12px 14px;
    border-radius: 12px;
    border: 2px solid rgba(139,99,71,0.15);
    background: white;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .input-field:focus { border-color: var(--accent); }
  textarea.input-field {
    resize: none;
    min-height: 80px;
    line-height: 1.6;
  }

  .time-row {
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }
  .time-row .time-group { flex: 1; min-width: 0; }
  .time-label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-light);
    margin-bottom: 6px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .time-display {
    width: 100%;
    padding: 11px 10px;
    border-radius: 12px;
    border: 2px solid rgba(139,99,71,0.15);
    background: white;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s;
    box-sizing: border-box;
  }
  .time-display:active { border-color: var(--accent); }
  .time-display.empty { color: var(--text-light); font-weight: 400; font-size: 13px; }
  .time-picker-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    align-items: flex-end;
  }
  .time-picker-overlay.show { display: flex; }
  .time-picker-sheet {
    background: white;
    width: 100%;
    border-radius: 20px 20px 0 0;
    padding: 20px;
  }
  .time-picker-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-light);
    text-align: center;
    margin-bottom: 16px;
  }
  .time-picker-selects {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 16px;
    align-items: center;
  }
  .time-select {
    padding: 10px 14px;
    border-radius: 12px;
    border: 2px solid rgba(139,99,71,0.2);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    background: var(--cream);
    text-align: center;
    width: 90px;
    outline: none;
  }
  .time-colon { font-size: 28px; font-weight: 700; color: var(--text); }
  .time-picker-btns { display: flex; gap: 10px; }
  .time-picker-btn {
    flex: 1;
    padding: 14px;
    border-radius: 14px;
    border: none;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }
  .time-picker-btn.cancel { background: var(--warm); color: var(--text); }
  .time-picker-btn.now { background: var(--brown); color: white; }
  .time-picker-btn.confirm { background: var(--accent); color: white; }
  .time-picker-quick { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .time-quick-btn {
    padding: 6px 12px;
    border-radius: 20px;
    border: 1.5px solid rgba(139,99,71,0.2);
    background: var(--cream);
    font-size: 12px;
    font-weight: 700;
    color: var(--brown-dark);
    cursor: pointer;
    font-family: 'Zen Kaku Gothic New', sans-serif;
  }

  .add-btn {
    width: 100%;
    padding: 15px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(212,132,90,0.4);
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .add-btn:active { transform: scale(0.98); }

  /* EVENT LIST */
  .event-list { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .event-card {
    background: white;
    border-radius: var(--radius);
    padding: 14px 16px;
    box-shadow: var(--shadow);
    display: flex;
    gap: 12px;
    align-items: flex-start;
    position: relative;
  }
  .event-icon {
    font-size: 28px;
    min-width: 36px;
    text-align: center;
  }
  .event-body { flex: 1; }
  .event-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }
  .event-cat {
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 0.05em;
  }
  .cat-food { background: #fff3cc; color: #8b6a00; }
  .cat-sleep { background: #ddeeff; color: #2a5f8b; }
  .cat-play { background: #ddf5e4; color: #2a6b3e; }
  .cat-health { background: #eeddf5; color: #5a2a6b; }
  .cat-other { background: #eeeeee; color: #555; }
  .event-time { font-size: 12px; color: var(--text-light); }
  .event-memo { font-size: 14px; line-height: 1.6; color: var(--text); }
  .event-delete {
    background: none;
    border: none;
    color: var(--text-light);
    font-size: 18px;
    cursor: pointer;
    padding: 0 0 0 4px;
    opacity: 0.5;
    transition: opacity 0.2s;
  }
  .event-delete:hover { opacity: 1; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-light);
  }
  .empty-state .big { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.8; }

  /* DIARY */
  .diary-screen { padding: 16px; }
  .api-key-box {
    background: #fff8f0;
    border: 2px dashed var(--accent);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
  }
  .api-key-box p {
    font-size: 13px;
    color: var(--text-light);
    margin-bottom: 10px;
  }
  .api-key-row { display: flex; gap: 8px; }
  .api-key-input {
    flex: 1;
    padding: 10px 12px;
    border-radius: 10px;
    border: 2px solid rgba(139,99,71,0.2);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 13px;
    background: white;
    outline: none;
    color: var(--text);
  }
  .api-key-input:focus { border-color: var(--accent); }
  .save-key-btn {
    padding: 10px 16px;
    background: var(--brown-dark);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
  }

  .generate-btn {
    width: 100%;
    padding: 16px;
    background: var(--brown-dark);
    color: var(--cream);
    border: none;
    border-radius: var(--radius);
    font-family: 'Noto Serif JP', serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(92,61,46,0.3);
    transition: all 0.2s;
    margin-bottom: 16px;
    letter-spacing: 0.08em;
  }
  .generate-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .generate-btn:active:not(:disabled) { transform: scale(0.98); }

  .diary-output {
    background: white;
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
    min-height: 200px;
    display: none;
  }
  .diary-output.visible { display: block; }
  .diary-output-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--brown-dark);
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--warm);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .copy-btn {
    font-size: 12px;
    padding: 4px 10px;
    background: var(--warm);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    color: var(--brown-dark);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 700;
  }
  .diary-section-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-light);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .diary-section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(139,99,71,0.15);
  }
  .diary-timeline {
    margin-bottom: 16px;
  }
  .diary-timeline-item {
    display: flex;
    gap: 10px;
    padding: 5px 0;
    font-size: 13px;
    line-height: 1.5;
    border-bottom: 1px dashed rgba(139,99,71,0.1);
  }
  .diary-timeline-item:last-child { border-bottom: none; }
  .diary-timeline-time {
    color: var(--text-light);
    font-size: 12px;
    white-space: nowrap;
    min-width: 50px;
    padding-top: 1px;
  }
  .diary-timeline-event { color: var(--text); flex: 1; }
  .diary-divider {
    border: none;
    border-top: 2px solid var(--warm);
    margin: 14px 0;
  }
  .diary-text {
    font-family: 'Noto Serif JP', serif;
    font-size: 15px;
    line-height: 2;
    color: var(--text);
    white-space: pre-wrap;
  }
  .loading-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 30px;
  }
  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* SETTINGS */
  .settings-section {
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    margin-bottom: 16px;
  }
  .settings-section-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-light);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 12px 16px 8px;
    background: var(--warm);
  }
  .settings-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-top: 1px solid rgba(139,99,71,0.08);
  }
  .settings-row:first-of-type { border-top: none; }
  .settings-label { font-size: 14px; font-weight: 500; }
  .settings-input {
    padding: 8px 12px;
    border-radius: 10px;
    border: 2px solid rgba(139,99,71,0.2);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 14px;
    background: var(--cream);
    outline: none;
    width: 130px;
    text-align: center;
    color: var(--text);
  }
  .settings-input:focus { border-color: var(--accent); }
  .child-name-input {
    width: 160px;
    text-align: left;
  }

  .sync-indicator {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: rgba(255,255,255,0.7);
    margin-left: 8px;
  }
  .sync-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #7fff7f;
  }
  .sync-dot.syncing {
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 0.3; }
    50% { opacity: 1; }
  }
  .date-picker-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 300;
    align-items: flex-end;
  }
  .date-picker-overlay.show { display: flex; }
  .date-picker-sheet {
    background: white;
    width: 100%;
    border-radius: 20px 20px 0 0;
    padding: 20px;
  }
  .date-picker-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-light);
    text-align: center;
    margin-bottom: 16px;
  }
  .date-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .date-nav-btn {
    background: var(--warm);
    border: none;
    border-radius: 10px;
    padding: 8px 16px;
    font-size: 18px;
    cursor: pointer;
    color: var(--brown-dark);
  }
  .date-nav-label {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }
  .date-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 16px;
  }
  .date-grid-header {
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-light);
    padding: 4px 0;
  }
  .date-cell {
    text-align: center;
    padding: 8px 4px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    color: var(--text);
    transition: all 0.15s;
  }
  .date-cell:hover { background: var(--warm); }
  .date-cell.today { font-weight: 700; color: var(--accent); }
  .date-cell.selected { background: var(--accent); color: white; border-radius: 50%; }
  .date-cell.empty { cursor: default; }
  .date-cell.future { color: var(--text-light); opacity: 0.4; cursor: default; }
  .date-picker-btns { display: flex; gap: 10px; }
  .date-picker-btn {
    flex: 1;
    padding: 14px;
    border-radius: 14px;
    border: none;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }
  .date-picker-btn.cancel { background: var(--warm); color: var(--text); }
  .date-picker-btn.today-btn { background: var(--brown-dark); color: white; }
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--brown-dark);
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    transition: all 0.3s;
    z-index: 1000;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<div class="header" id="mainHeader">
  <div style="flex:1">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <div class="header-title">📒 ほいくにっき</div>
      <button class="settings-btn" onclick="switchTab('settings')">⚙️</button>
    </div>
    <div style="display:flex;align-items:center;gap:6px;">
      <div class="header-date" id="headerDate" onclick="openDatePicker()" style="cursor:pointer;text-decoration:underline dotted rgba(255,255,255,0.5);"></div>
      <span class="sync-indicator" id="syncIndicator" style="display:none">
        <span class="sync-dot" id="syncDot"></span>
        <span id="syncText">同期中</span>
      </span>
    </div>
    <div class="weather-row">
      <button class="weather-btn" data-weather="sunny" onclick="selectWeather(this)">☀️ 晴れ</button>
      <button class="weather-btn" data-weather="cloudy" onclick="selectWeather(this)">☁️ くもり</button>
      <button class="weather-btn" data-weather="rainy" onclick="selectWeather(this)">🌧 雨</button>
      <button class="weather-btn" data-weather="snowy" onclick="selectWeather(this)">❄️ 雪</button>
    </div>
  </div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbyeD0h0Ijwib9wRgGjTsXF_7tcJkimZ3Xz_KfY5Te1AfoPGUMMHLhheCdqB--fpa1k/exec';
  const GAS_PASSWORD = 'Sosuke2024';
  let events = [];
  let isSyncing = false;
  let syncQueue = JSON.parse(localStorage.getItem('hoiku_sync_queue') || '[]');
  let selectedCategory = null;
  let currentDate = new Date(); // 現在参照中の日付
  let apiKey = '';

  const catLabels = {
    breakfast:'朝ごはん', lunch:'昼ごはん', dinner:'夜ごはん', snack:'おやつ',
    wakeup:'起床', bedtime:'就寝', nap:'昼寝', play:'遊び・活動', bath:'お風呂', poop:'うんち', temp:'体温', other:'その他'
  };
  const catIcons = {
    breakfast:'🌅', lunch:'🍜', dinner:'🍚', snack:'🍪',
    wakeup:'☀️', bedtime:'🌙', nap:'😴', play:'🎠', bath:'🛁', poop:'💩', temp:'🌡️', other:'📌'
  };
  const catClasses = {
    breakfast:'cat-food', lunch:'cat-food', dinner:'cat-food', snack:'cat-food',
    wakeup:'cat-sleep', bedtime:'cat-sleep', nap:'cat-sleep',
    play:'cat-play', bath:'cat-play', poop:'cat-health', temp:'cat-health', other:'cat-other'
  };
  let selectedWeather = null;

  // 初期化
  let currentPickerTarget = 'start';

  function openTimePicker(target) {
    currentPickerTarget = target;
    const title = document.getElementById('timePickerTitle');
    title.textContent = target === 'start' ? '開始時間を入力' : '終了時間を入力';

    // セレクトボックスの選択肢を生成
    const hourSel = document.getElementById('pickerHour');
    const minSel = document.getElementById('pickerMinute');
    if (hourSel.options.length === 0) {
      for (let h = 0; h < 24; h++) hourSel.add(new Option(String(h).padStart(2,'0'), h));
      for (let m = 0; m < 60; m += 5) minSel.add(new Option(String(m).padStart(2,'0'), m));
    }

    // 現在の値があればそれをセット、なければ現在時刻
    const existing = document.getElementById(target === 'start' ? 'startTime' : 'endTime').value;
    if (existing) {
      const [h, m] = existing.split(':');
      hourSel.value = parseInt(h);
      minSel.value = Math.floor(parseInt(m) / 5) * 5;
    } else {
      setPickerNow();
    }

    document.getElementById('timePickerOverlay').classList.add('show');
  }

  function setPickerNow() {
    const now = new Date();
    const h = now.getHours();
    const m = Math.floor(now.getMinutes() / 5) * 5;
    document.getElementById('pickerHour').value = h;
    document.getElementById('pickerMinute').value = m;
  }

  function setQuickTime(h, m) {
    document.getElementById('pickerHour').value = h;
    document.getElementById('pickerMinute').value = m;
  }

  function confirmTime() {
    const h = String(document.getElementById('pickerHour').value).padStart(2,'0');
    const m = String(document.getElementById('pickerMinute').value).padStart(2,'0');
    const timeStr = `${h}:${m}`;
    const hiddenId = currentPickerTarget === 'start' ? 'startTime' : 'endTime';
    const displayId = currentPickerTarget === 'start' ? 'startTimeDisplay' : 'endTimeDisplay';
    document.getElementById(hiddenId).value = timeStr;
    const disp = document.getElementById(displayId);
    disp.textContent = timeStr;
    disp.classList.remove('empty');
    closeTimePicker();
  }

  function closeTimePicker(e) {
    if (e && e.target !== document.getElementById('timePickerOverlay')) return;
    document.getElementById('timePickerOverlay').classList.remove('show');
  }

  let pickerMonth = new Date();

  function updateDateDisplay() {
    const dateStr = currentDate.toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
    document.getElementById('headerDate').textContent = '📅 ' + dateStr;
    document.getElementById('diaryDateLabel').textContent = dateStr + 'の日記';
  }

  function openDatePicker() {
    pickerMonth = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
    renderCalendar();
    document.getElementById('datePickerOverlay').classList.add('show');
  }

  function closeDatePicker() {
    document.getElementById('datePickerOverlay').classList.remove('show');
  }

  function closeDatePickerOverlay(e) {
    if (e.target === document.getElementById('datePickerOverlay')) closeDatePicker();
  }

  function changeMonth(delta) {
    pickerMonth.setMonth(pickerMonth.getMonth() + delta);
    renderCalendar();
  }

  function renderCalendar() {
    const year = pickerMonth.getFullYear();
    const month = pickerMonth.getMonth();
    document.getElementById('dateNavLabel').textContent = year + '年' + (month+1) + '月';

    const firstDay = new Date(year, month, 1).getDay();
    const lastDate = new Date(year, month+1, 0).getDate();
    const today = new Date();
    const todayKey = toDateKey(today);
    const selectedKey = toDateKey(currentDate);

    // 曜日ヘッダーも同じgridに含める
    const days = ['日','月','火','水','木','金','土'];
    let html = days.map(d => `<div class="date-grid-header">${d}</div>`).join('');

    let day = 1;
    for (let i = 0; i < 6; i++) {
      for (let j = 0; j < 7; j++) {
        const idx = i * 7 + j;
        if (idx < firstDay || day > lastDate) {
          html += '<div class="date-cell empty"></div>';
        } else {
          const d = new Date(year, month, day);
          const dKey = toDateKey(d);
          const isToday = dKey === todayKey;
          const isSelected = dKey === selectedKey;
          const isFuture = d > today && dKey !== todayKey;
          let cls = 'date-cell';
          if (isSelected) cls += ' selected';
          else if (isToday) cls += ' today';
          if (isFuture) cls += ' future';
          const onclick = isFuture ? '' : `onclick="selectDate(${year},${month},${day})"`;
          html += `<div class="${cls}" ${onclick}>${day}</div>`;
          day++;
        }
      }
      if (day > lastDate) break;
    }
    document.getElementById('dateGrid').innerHTML = html;
  }

  function selectDate(year, month, day) {
    currentDate = new Date(year, month, day);
    updateDateDisplay();
    // 天気の復元
    document.querySelectorAll('.weather-btn').forEach(b => b.classList.remove('selected'));
    selectedWeather = null;
    const savedWeather = localStorage.getItem('hoiku_weather_' + toDateKey(currentDate));
    if (savedWeather) {
      selectedWeather = savedWeather;
      const wBtn = document.querySelector(`.weather-btn[data-weather="${savedWeather}"]`);
      if (wBtn) wBtn.classList.add('selected');
    }
    closeDatePicker();
    loadEventsFromGAS();
    // 日記の読み込み（ローカル優先→GASから取得）
    loadDiaryForDate(toDateKey(currentDate));
  }

  function selectToday() {
    selectDate(new Date().getFullYear(), new Date().getMonth(), new Date().getDate());
  }

  async function loadDiaryForDate(dateKey) {
    const diaryOutput = document.getElementById('diaryOutput');
    const diaryTextEl = document.getElementById('diaryText');
    const timeline = document.getElementById('diaryTimeline');

    // まずローカルから表示
    const savedDiary = localStorage.getItem('hoiku_diary_' + dateKey);
    if (savedDiary) {
      try {
        const { text, timeline: tl } = JSON.parse(savedDiary);
        renderDiaryDisplay(text, tl);
        return;
      } catch(e) {}
    }

    // ローカルになければGASから取得
    const gasData = await loadDiaryFromGAS(dateKey);
    if (gasData) {
      localStorage.setItem('hoiku_diary_' + dateKey, JSON.stringify(gasData));
      renderDiaryDisplay(gasData.text, gasData.timeline);
    } else {
      diaryTextEl.textContent = '';
      timeline.innerHTML = '';
      diaryOutput.classList.remove('visible');
    }
  }

  function renderDiaryDisplay(text, timelineData) {
    const diaryOutput = document.getElementById('diaryOutput');
    const diaryTextEl = document.getElementById('diaryText');
    const timeline = document.getElementById('diaryTimeline');
    diaryOutput.classList.add('visible');
    diaryTextEl.textContent = text;
    if (timelineData && timelineData.length > 0) {
      timeline.innerHTML = timelineData.map(ev => {
        const timeStr = (ev.start || '') + (ev.end ? '〜' + ev.end : '');
        const label = catLabels[ev.category] || ev.category;
        const icon = catIcons[ev.category] || '';
        const memo = ev.memo ? '　' + ev.memo : '';
        return `<div class="diary-timeline-item">
          <span class="diary-timeline-time">${timeStr}</span>
          <span class="diary-timeline-event">${icon} ${label}${memo}</span>
        </div>`;
      }).join('');
    }
  }

  function selectWeather(btn) {
    document.querySelectorAll('.weather-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedWeather = btn.dataset.weather;
    localStorage.setItem('hoiku_weather_' + toDateKey(new Date()), selectedWeather);
  }

  function init() {
    const now = new Date();
    // 時刻は独自ピッカーで入力するため初期値セット不要

    // 日付表示を更新
    updateDateDisplay();

    // GASからイベントを読み込む
    loadEventsFromGAS();

    const savedWeather = localStorage.getItem('hoiku_weather_' + toDateKey(now));
    if (savedWeather) {
      selectedWeather = savedWeather;
      const wBtn = document.querySelector(`.weather-btn[data-weather="${savedWeather}"]`);
      if (wBtn) wBtn.classList.add('selected');
    }

    const savedKey = localStorage.getItem('hoiku_api_key');
    if (savedKey) {
      apiKey = savedKey;
      document.getElementById('apiKeyBox').style.display = 'none';
      document.getElementById('settingsApiKey').value = savedKey;
    }

    const savedGasUrl = localStorage.getItem('hoiku_gas_url');
    if (savedGasUrl) {
      GAS_URL = 'https://script.google.com/macros/s/' + savedGasUrl + '/exec';
      document.getElementById('settingsGasUrl').value = savedGasUrl;
    }

    const savedGasPass = localStorage.getItem('hoiku_gas_password');
    if (savedGasPass) {
      GAS_PASSWORD = savedGasPass;
      document.getElementById('settingsGasPassword').value = savedGasPass;
    }

    const savedName = localStorage.getItem('hoiku_child_name');
    if (savedName) document.getElementById('childName').value = savedName;

    const savedBirthday = localStorage.getItem('hoiku_child_birthday');
    if (savedBirthday) {
      document.getElementById('childBirthday').value = savedBirthday;
      updateAge();
    }

    const savedTime = localStorage.getItem('hoiku_generate_time');
    if (savedTime) document.getElementById('generateTime').value = savedTime;

    renderEvents();
    checkAutoGenerate();

    // 電波が戻ったらキューを自動送信
    window.addEventListener('online', () => {
      showToast('電波が回復しました');
      processQueue();
    });
    // 起動時にキューが残っていたら送信
    if (syncQueue.length > 0 && navigator.onLine) {
      processQueue();
    }

    // タブバーをヘッダーの直下に固定
    const header = document.getElementById('mainHeader');
    const tabs = document.querySelector('.tabs');
    const headerHeight = header.offsetHeight;
    tabs.style.top = headerHeight + 'px';
  }

  function toDateKey(d) {
    return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
  }

  function saveEvents() {
    // ローカルにもバックアップ保存
    const key = 'hoiku_events_' + toDateKey(currentDate);
    localStorage.setItem(key, JSON.stringify(events));
  }

  function showSync(text) {
    const indicator = document.getElementById('syncIndicator');
    const dot = document.getElementById('syncDot');
    const txt = document.getElementById('syncText');
    indicator.style.display = 'inline-flex';
    dot.classList.add('syncing');
    txt.textContent = text;
  }

  function hideSync() {
    const indicator = document.getElementById('syncIndicator');
    const dot = document.getElementById('syncDot');
    indicator.style.display = 'none';
    dot.classList.remove('syncing');
  }

  function formatTime(val) {
    if (!val) return '';
    const s = String(val).trim();
    // 「6:00」→「06:00」に正規化
    if (/^\d:\d{2}$/.test(s)) return '0' + s;
    return s;
  }

  async function loadEventsFromGAS() {
    if (!GAS_URL) { showToast('設定画面でGAS URLを入力してください'); return; }
    showSync('読み込み中');
    const dateKey = toDateKey(currentDate);
    // まずローカルから表示
    const saved = localStorage.getItem('hoiku_events_' + dateKey);
    if (saved) { events = JSON.parse(saved); renderEvents(); }
    try {
      const res = await fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'getAll', date: dateKey, password: GAS_PASSWORD })
      });
      const json = await res.json();
      if (json.status === 'ok') {
        events = json.data.map(ev => ({
          ...ev,
          start: formatTime(ev.start),
          end:   formatTime(ev.end),
          memo:  String(ev.memo || '')
        })).sort((a,b) => a.start.localeCompare(b.start));
        saveEvents();
        renderEvents();
        hideSync();
      }
    } catch(e) {
      hideSync();
      showToast('オフライン：ローカルデータを表示中');
    }
  }

  function saveQueueToStorage() {
    localStorage.setItem('hoiku_sync_queue', JSON.stringify(syncQueue));
  }

  async function saveDiaryToGAS(dateKey, diaryData) {
    try {
      await fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'saveDiary', date: dateKey, diary: diaryData, password: GAS_PASSWORD })
      });
    } catch(e) {
      // 失敗してもローカルには保存済みなので無視
    }
  }

  async function loadDiaryFromGAS(dateKey) {
    try {
      const res = await fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'getDiary', date: dateKey, password: GAS_PASSWORD })
      });
      const json = await res.json();
      if (json.status === 'ok' && json.data) return json.data;
    } catch(e) {}
    return null;
  }

  async function processQueue() {
    if (syncQueue.length === 0) return;
    showSync('再送信中');
    const remaining = [];
    for (const task of syncQueue) {
      try {
        await fetch(GAS_URL, {
          method: 'POST',
          body: JSON.stringify(task)
        });
      } catch(e) {
        remaining.push(task); // 失敗したらキューに残す
      }
    }
    syncQueue = remaining;
    saveQueueToStorage();
    hideSync();
    if (syncQueue.length === 0 && remaining.length === 0) {
      showToast('同期完了！');
    }
  }

  async function saveEventToGAS(ev) {
    showSync('保存中');
    const dateKey = toDateKey(currentDate);
    const task = { action: 'save', event: { ...ev, date: dateKey }, password: GAS_PASSWORD };
    try {
      await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(task) });
      hideSync();
    } catch(e) {
      hideSync();
      syncQueue.push(task);
      saveQueueToStorage();
      showToast('オフライン：電波が戻ったら自動送信します');
    }
  }

  async function deleteEventFromGAS(id) {
    showSync('削除中');
    const task = { action: 'delete', id: String(id), password: GAS_PASSWORD };
    try {
      await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(task) });
      hideSync();
    } catch(e) {
      hideSync();
      syncQueue.push(task);
      saveQueueToStorage();
    }
  }

  function saveSettings() {
    const name = document.getElementById('childName').value;
    const time = document.getElementById('generateTime').value;
    const key = document.getElementById('settingsApiKey').value;
    const birthday = document.getElementById('childBirthday').value;
    const gasUrl = document.getElementById('settingsGasUrl').value;
    const gasPass = document.getElementById('settingsGasPassword').value;
    localStorage.setItem('hoiku_child_name', name);
    localStorage.setItem('hoiku_generate_time', time);
    localStorage.setItem('hoiku_child_birthday', birthday);
    if (key) {
      apiKey = key;
      localStorage.setItem('hoiku_api_key', key);
    }
    if (gasUrl) {
      // IDだけ保存して、URLはIDから組み立てる
      GAS_URL = 'https://script.google.com/macros/s/' + gasUrl + '/exec';
      localStorage.setItem('hoiku_gas_url', gasUrl);
    }
    if (gasPass) {
      GAS_PASSWORD = gasPass;
      localStorage.setItem('hoiku_gas_password', gasPass);
    }
  }

  function updateAge() {
    const birthday = document.getElementById('childBirthday').value;
    const display = document.getElementById('childAgeDisplay');
    if (!birthday) { display.textContent = '—'; return; }
    const birth = new Date(birthday);
    const today = new Date();
    let years = today.getFullYear() - birth.getFullYear();
    let months = today.getMonth() - birth.getMonth();
    if (months < 0) { years--; months += 12; }
    if (today.getDate() < birth.getDate()) months--;
    if (months < 0) { years--; months += 12; }
    if (years === 0) {
      display.textContent = `${months}ヶ月`;
    } else {
      display.textContent = `${years}歳${months}ヶ月`;
    }
  }

  function saveApiKey() {
    const key = document.getElementById('apiKeyInput').value.trim();
    if (!key.startsWith('sk-ant-')) { showToast('APIキーが正しくないようです'); return; }
    apiKey = key;
    localStorage.setItem('hoiku_api_key', key);
    document.getElementById('settingsApiKey').value = key;
    document.getElementById('apiKeyBox').style.display = 'none';
    showToast('APIキーを保存しました！');
  }

  function switchTab(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('screen-' + name).classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
  }

  function selectCategory(btn) {
    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedCategory = btn.dataset.cat;
  }

  function addEvent() {
    if (!selectedCategory) { showToast('カテゴリを選んでください'); return; }
    const start = document.getElementById('startTime').value;
    const end = document.getElementById('endTime').value;
    const memo = document.getElementById('memoInput').value.trim();

    const ev = {
      id: Date.now(),
      category: selectedCategory,
      start, end, memo,
      time: new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'})
    };
    events.push(ev);
    events.sort((a,b) => a.start.localeCompare(b.start));
    saveEvents();
    renderEvents();
    saveEventToGAS(ev);

    // リセット
    document.getElementById('memoInput').value = '';
    document.getElementById('startTime').value = '';
    document.getElementById('endTime').value = '';
    document.getElementById('startTimeDisplay').textContent = 'タップして入力';
    document.getElementById('startTimeDisplay').classList.add('empty');
    document.getElementById('endTimeDisplay').textContent = 'タップして入力';
    document.getElementById('endTimeDisplay').classList.add('empty');
    showToast('記録しました！');
    switchTab('list');
  }

  function deleteEvent(id) {
    // ローカルから即座に削除して画面を更新
    events = events.filter(e => e.id !== id);
    saveEvents();
    renderEvents();
    showToast('削除しました');
    // GASへの削除はバックグラウンドで（待たない）
    deleteEventFromGAS(id);
  }

  function renderEvents() {
    const container = document.getElementById('eventList');
    if (events.length === 0) {
      container.innerHTML = `<div class="empty-state"><div class="big">📝</div><p>まだ記録がありません。<br>「記録」タブからイベントを追加しましょう。</p></div>`;
      return;
    }
    container.innerHTML = '<div class="event-list">' + events.map(ev => `
      <div class="event-card">
        <div class="event-icon">${catIcons[ev.category]}</div>
        <div class="event-body">
          <div class="event-meta">
            <span class="event-cat ${catClasses[ev.category]}">${catLabels[ev.category]}</span>
            <span class="event-time">${ev.start}${ev.end ? '〜'+ev.end : ''}</span>
          </div>
          <div class="event-memo">${ev.memo}</div>
        </div>
        <button class="event-delete" onclick="deleteEvent(${ev.id})">✕</button>
      </div>
    `).join('') + '</div>';
  }

  async function generateDiary() {
    if (!apiKey) { showToast('APIキーを設定してください'); switchTab('diary'); return; }
    if (events.length === 0) { showToast('記録がありません'); return; }

    const btn = document.getElementById('generateBtn');
    const output = document.getElementById('diaryOutput');
    const diaryText = document.getElementById('diaryText');

    btn.disabled = true;
    btn.textContent = '✨ 生成中...';
    output.classList.add('visible');
    document.getElementById('diaryTimeline').innerHTML = '';
    diaryText.innerHTML = '<div class="loading-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';

    const childName = document.getElementById('childName').value || 'こども';
    const ageDisplay = document.getElementById('childAgeDisplay').textContent;
    const childAge = ageDisplay !== '—' ? `（${ageDisplay}）` : '';
    const today = currentDate.toLocaleDateString('ja-JP', {year:'numeric', month:'long', day:'numeric'});

    const eventSummary = events.map(ev =>
      `【${catLabels[ev.category]}】${ev.start}${ev.end ? '〜'+ev.end : ''} : ${ev.memo}`
    ).join('\n');

    const weatherLabels = { sunny:'晴れ', cloudy:'くもり', rainy:'雨', snowy:'雪' };
    const weatherStr = selectedWeather ? `天気：${weatherLabels[selectedWeather]}` : '';

    const prompt = `今日（${today}）の${childName}${childAge}の保育記録を、保護者が読む連絡帳風の日記にまとめてください。

${weatherStr}
記録：
${eventSummary}

条件：
- 300〜400字程度の自然な日記調
- 子供の様子や気持ちが伝わる温かい文章
- 敬語は使わず、日記らしいふつうの文体
- 箇条書きではなく、流れのある文章で`;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      const text = data.content[0].text;
      const diaryData = { text, timeline: events };

      // ローカルに保存
      const dateKey = toDateKey(currentDate);
      localStorage.setItem('hoiku_diary_' + dateKey, JSON.stringify(diaryData));

      // GASに保存（同期）
      saveDiaryToGAS(dateKey, diaryData);

      // 統一された描画関数で表示
      renderDiaryDisplay(text, events);
    } catch (e) {
      diaryText.textContent = 'エラーが発生しました：' + e.message;
    }

    btn.disabled = false;
    btn.textContent = '✨ 今日の日記を生成する';
    document.getElementById('diaryDateLabel').textContent = currentDate.toLocaleDateString('ja-JP', {year:'numeric', month:'long', day:'numeric', weekday:'short'}) + 'の日記';
  }

  function copyDiary() {
    const timelineItems = document.querySelectorAll('.diary-timeline-item');
    let timelineText = '';
    timelineItems.forEach(item => {
      const t = item.querySelector('.diary-timeline-time').textContent;
      const e = item.querySelector('.diary-timeline-event').textContent.trim();
      timelineText += t + '　' + e + '\n';
    });
    const diaryText = document.getElementById('diaryText').textContent;
    const full = timelineText + '\n' + diaryText;
    navigator.clipboard.writeText(full).then(() => showToast('コピーしました！'));
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function checkAutoGenerate() {
    setInterval(() => {
      const now = new Date();
      const hh = String(now.getHours()).padStart(2,'0');
      const mm = String(now.getMinutes()).padStart(2,'0');
      const current = `${hh}:${mm}`;
      const target = document.getElementById('generateTime').value;
      if (current === target && events.length > 0 && apiKey) {
        const lastAuto = localStorage.getItem('hoiku_last_auto');
        const todayKey = toDateKey(now);
        if (lastAuto !== todayKey) {
          localStorage.setItem('hoiku_last_auto', todayKey);
          generateDiary();
        }
      }
    }, 60000);
  }

  init();
</script>
